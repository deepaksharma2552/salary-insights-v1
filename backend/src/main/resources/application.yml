spring:
  application:
    name: salary-insights-portal

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/salary_insights_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # OAuth2 Client Registration (Fixes the 500 Error)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  # Crucial for Railway HTTPS to work with OAuth2
  forward-headers-strategy: framework
  servlet:
    context-path: /api

app:
  ai:
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    enabled: ${AI_REFRESH_ENABLED:true}
  oauth2:
    # This is likely used in your SecurityConfig for the final frontend redirect
    redirect-uri: ${APP_OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/redirect}
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: 86400000
    refresh-expiration: 604800000
  cors:
    allowed-origins:
      - http://localhost:3000
      - https://accurate-mercy-production.