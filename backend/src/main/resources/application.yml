spring:
  application:
    name: salary-insights-portal

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/salary_insights_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # Moved JPA and Flyway out of the 'app' block back to 'spring' level
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  forward-headers-strategy: framework
  servlet:
    context-path: /api

# Unified 'app' block (merged line 16 and line 42)
app:
  ai:
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    enabled: ${AI_REFRESH_ENABLED:true}
  oauth2:
    redirect-uri: ${APP_OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/redirect}
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: 86400000
    refresh-expiration: 604800000
  cors:
    allowed-origins:
      - http://localhost:3000
      - http