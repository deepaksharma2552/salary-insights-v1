spring:
  application:
    name: salary-insights-portal

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/salary_insights_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2          # don't hold 5 persistent connections when idle
      connection-timeout: 30000
      keepalive-time: 30000    # ping idle connections every 30s — prevents "timed out" logs
      idle-timeout: 600000     # evict idle connections after 10 min
      max-lifetime: 1800000    # recycle connections after 30 min (must be < DB wait_timeout)

  jpa:
    hibernate:
      ddl-auto: validate       # Flyway owns the schema — Hibernate must not alter it
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  forward-headers-strategy: framework
  servlet:
    context-path: /api

app:
  oauth2:
    redirect-uri: ${APP_OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/redirect}
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: 86400000
    refresh-expiration: 604800000
  cors:
    allowed-origins:
      - http://localhost:3000
      - ${APP_CORS_ORIGIN:http://localhost:3000}
  analytics:
    # How often the page view aggregation job runs (ms). Default 1 hour.
    # Override via PAGE_VIEW_AGGREGATE_INTERVAL_MS env var without redeploying.
    aggregate-interval-ms: ${PAGE_VIEW_AGGREGATE_INTERVAL_MS:3600000}
    # Max raw events processed per job run — prevents runaway on backlog.
    aggregate-batch-size: ${PAGE_VIEW_AGGREGATE_BATCH_SIZE:5000}
    # Set false to pause aggregation without redeploying.
    aggregate-enabled: ${PAGE_VIEW_AGGREGATE_ENABLED:true}

  audit:
    # Rows older than this many days are moved to audit_logs_archive nightly.
    # 90 keeps ~3 months in the live table. Set to 180/365 for longer hot retention.
    archive-after-days: ${AUDIT_ARCHIVE_AFTER_DAYS:90}
    # Rows moved per transaction — keeps each DELETE short to avoid lock spikes.
    archive-batch-size: ${AUDIT_ARCHIVE_BATCH_SIZE:1000}
    # Set false via env var to pause archival without redeploying (e.g. during audits).
    archive-enabled: ${AUDIT_ARCHIVE_ENABLED:true}

anthropic:
  api:
    # Set ANTHROPIC_API_KEY in your environment / Railway variables.
    # Get your key at: https://console.anthropic.com/settings/keys
    key: ${ANTHROPIC_API_KEY:}
