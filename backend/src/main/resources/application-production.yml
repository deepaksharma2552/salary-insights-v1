# application-production.yml
# Active when SPRING_PROFILES_ACTIVE=production
# Overrides values in application.yml for production hardening

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 20000

  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    com.salaryinsights: INFO
    org.springframework.security: WARN
  file:
    name: /app/logs/application.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never   # Don't expose DB details publicly

app:
  oauth2:
    redirect-uri: ${APP_OAUTH2_REDIRECT_URI}
