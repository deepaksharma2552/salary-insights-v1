# application-production.yml
# Active when SPRING_PROFILES_ACTIVE=production

spring:
  datasource:
    # Explicitly mapping every field to ensure the Production profile finds them
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # Ensure Flyway still runs in production
  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    root: WARN
    com.salaryinsights: INFO
    org.springframework.security: WARN
  # Removed file logging to prevent 'Permission Denied' errors in the container

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never 

app:
  oauth2:
    redirect-uri: ${APP_OAUTH2_REDIRECT_URI}
  # JWT settings will be inherited from application.yml 
  # unless you choose to override them here.