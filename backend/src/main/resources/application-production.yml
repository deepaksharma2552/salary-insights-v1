# application-production.yml
# Active when SPRING_PROFILES_ACTIVE=production

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 20000

  jpa:
    hibernate:
      # validate: Flyway owns the schema — Hibernate must never alter production data
      # Changed from 'update' which could silently drop/alter columns on startup
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    root: WARN
    com.salaryinsights: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never

app:
  oauth2:
    redirect-uri: ${APP_OAUTH2_REDIRECT_URI}
