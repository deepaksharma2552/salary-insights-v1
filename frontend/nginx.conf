server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 1. Health check (at the top)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # 2. Proxy API requests (inside the server block)
    location /api/ {
        resolver fd12::10 ipv6=on valid=1s;
        set $backend_service "http://salary-insights-v1.railway.internal:8080";

        proxy_pass $backend_service;
        
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
    }

    # 3. Static Assets cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 4. React Router fallback (must be at the bottom)
    location / {
        try_files $uri $uri/ /index.html;
    }
}