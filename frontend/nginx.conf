server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 1. Health check (at the top)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # 2. Proxy API requests (inside the server block)
   location /api/ {
        # Use square brackets for IPv6 and include the port if needed
        resolver [fd12::10] valid=1s;

        # Use the internal name exactly as it appears in Railway
        set $backend_service "http://salary-insights-v1.railway.internal:8080";

        # Add $request_uri to ensure the full path (/public/companies) is passed
        proxy_pass $backend_service$request_uri;
        
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        
        # Increase timeouts slightly to avoid premature 502s
        proxy_connect_timeout 30s;
        proxy_read_timeout    30s;
    }

    # 3. Static Assets cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 4. React Router fallback (must be at the bottom)
    location / {
        try_files $uri $uri/ /index.html;
    }
}