# Proxy all /api/* to the Spring Boot backend
    location /api/ {
        # 1. Use Railway's internal DNS resolver (Essential for IPv6 internal networking)
        resolver fd12::10 ipv6=on valid=1s;

        # 2. Set the backend URL as a variable (Prevents startup crashes)
        # Verify that 'salary-insights-v1' is exactly the name on your Railway tile
        set $backend_service "http://salary-insights-v1.railway.internal:8080";

        # 3. Use the variable in proxy_pass
        proxy_pass $backend_service;
        
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        
        # 4. Force HTTPS protocol forwarding for Spring Security
        proxy_set_header   X-Forwarded-Proto https;
        
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
    }