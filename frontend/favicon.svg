<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#0ea5e9"/>
  
  <!-- Outer ring arc (top-right, visible segment) -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
  <path d="M 16 3 A 13 13 0 0 1 29 16" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Inner ring arc (bottom-left, visible segment) -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <path d="M 16 25 A 9 9 0 0 1 7 16" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- SI text in center -->
  <text x="16" y="14" font-family="Inter,Arial,sans-serif" font-size="8" font-weight="800" fill="white" text-anchor="middle" dominant-baseline="middle">SI</text>
  <text x="16" y="22" font-family="monospace" font-size="5" font-weight="600" fill="rgba(255,255,255,0.85)" text-anchor="middle" dominant-baseline="middle">360°</text>
</svg>
