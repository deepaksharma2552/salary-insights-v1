<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 38 38" fill="none">
  <!-- dark bg for tab contrast -->
  <rect width="38" height="38" rx="9" fill="#0f172a"/>
  <!-- orbit track — blue -->
  <circle cx="19" cy="19" r="15.5" stroke="#3b82f6" stroke-width="1.2" fill="none" opacity="0.3" stroke-dasharray="3 2.5"/>
  <!-- inner track -->
  <circle cx="19" cy="19" r="9.5" stroke="#3b82f6" stroke-width="0.8" fill="none" opacity="0.15" stroke-dasharray="2 2"/>
  <!-- comet A — top (12 o'clock) -->
  <circle cx="19" cy="3.5" r="2.8" fill="#3b82f6"/>
  <!-- comet B — right (3 o'clock) -->
  <circle cx="34.5" cy="19" r="2.2" fill="#2563eb"/>
  <!-- comet C — bottom-right (~4 o'clock), lighter -->
  <circle cx="30" cy="30" r="1.8" fill="#60a5fa" opacity="0.8"/>
  <!-- core -->
  <circle cx="19" cy="19" r="5" fill="#3b82f6" opacity="0.2"/>
  <circle cx="19" cy="19" r="3.2" fill="#3b82f6"/>
</svg>
