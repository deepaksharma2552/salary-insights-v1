<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 38 38" fill="none">
  <!-- dark bg square for contrast on light browser tabs -->
  <rect width="38" height="38" rx="9" fill="#0d1117"/>
  <!-- outer orbit track -->
  <circle cx="19" cy="19" r="16" stroke="#10b981" stroke-width="1.2" fill="none" opacity="0.3" stroke-dasharray="3 2.5"/>
  <!-- inner orbit track -->
  <circle cx="19" cy="19" r="9.5" stroke="#10b981" stroke-width="0.8" fill="none" opacity="0.2" stroke-dasharray="2 2"/>
  <!-- comet A — top (12 o'clock) -->
  <circle cx="19" cy="3" r="2.8" fill="#10b981"/>
  <!-- comet B — right (3 o'clock) -->
  <circle cx="35" cy="19" r="2.4" fill="#059669"/>
  <!-- comet C — bottom-right (~4 o'clock) -->
  <circle cx="30.3" cy="30.3" r="1.8" fill="#10b981" opacity="0.7"/>
  <!-- core -->
  <circle cx="19" cy="19" r="5" fill="#10b981" opacity="0.2"/>
  <circle cx="19" cy="19" r="3.2" fill="#10b981"/>
</svg>
